proxy-groups:
  - name: proxy
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
      - "0"
      - "1"
      - "2"
rules:
  # Genshin Impact
  - "DST-PORT,8999,DIRECT"
  - "DST-PORT,22101,DIRECT"
  - "DST-PORT,22102,DIRECT"
  - "DST-PORT,42472,DIRECT"
  - "DOMAIN-SUFFIX,hoyoverse.com,DIRECT"
  - "DOMAIN-SUFFIX,yuanshen.com,DIRECT"
  # SteamDB
  - "DOMAIN-SUFFIX,steamdb.info,DIRECT"
  # All
  - "GEOSITE,private,DIRECT"
  - "GEOIP,private,DIRECT,no-resolve"
  - "GEOIP,lan,DIRECT,no-resolve"
  - "DOMAIN-SUFFIX,cn,DIRECT"
  - "GEOSITE,cn,DIRECT"
  - "GEOIP,CN,DIRECT"
  - "MATCH,proxy"
