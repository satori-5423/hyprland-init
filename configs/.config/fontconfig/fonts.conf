<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <!-- Sans-serif -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>SF Pro Text</family>
      <family>SF Pro Display</family>
      <family>Noto Sans CJK SC</family>
      <family>Noto Sans CJK TC</family>
      <family>Noto Sans CJK JP</family>
      <family>Noto Sans CJK KR</family>
      <family>Noto Sans</family>
      <family>Symbols Nerd Font</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- Serif -->
  <alias>
    <family>serif</family>
    <prefer>
      <family>New York</family>
      <family>Noto Serif CJK SC</family>
      <family>Noto Serif CJK TC</family>
      <family>Noto Serif CJK JP</family>
      <family>Noto Serif CJK KR</family>
      <family>Symbols Nerd Font</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- Monospace -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>JetBrainsMono Nerd Font</family>
      <family>JetBrainsMono NF</family>
      <family>Noto Sans Mono CJK SC</family>
      <family>Noto Sans Mono CJK TC</family>
      <family>Noto Sans Mono CJK JP</family>
      <family>Noto Sans Mono CJK KR</family>
      <family>Symbols Nerd Font Mono</family>
      <family>Noto Color Emoji</family> 
    </prefer>
  </alias>

  <!-- Japanese -->
  <match target="pattern">
    <test name="lang" compare="contains"><string>ja</string></test>
    <test name="family"><string>Noto Sans CJK SC</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Sans CJK JP</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>ja</string></test>
    <test name="family"><string>Noto Serif CJK SC</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Serif CJK JP</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>ja</string></test>
    <test name="family"><string>Noto Sans Mono CJK SC</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Sans Mono CJK JP</string>
    </edit>
  </match>

  <!-- Traditional Chinese (Taiwan) -->
  <match target="pattern">
    <test name="lang" compare="contains"><string>tw</string></test>
    <test name="family"><string>Noto Sans CJK SC</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Sans CJK TC</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>tw</string></test>
    <test name="family"><string>Noto Serif CJK SC</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Serif CJK TC</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>tw</string></test>
    <test name="family"><string>Noto Sans Mono CJK SC</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Sans Mono CJK TC</string>
    </edit>
  </match>

  <!-- Traditional Chinese (Hong Kong) -->
  <match target="pattern">
    <test name="lang" compare="contains"><string>hk</string></test>
    <test name="family"><string>Noto Sans CJK SC</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Sans CJK HK</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>hk</string></test>
    <test name="family"><string>Noto Serif CJK SC</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Serif CJK HK</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>hk</string></test>
    <test name="family"><string>Noto Sans Mono CJK SC</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Sans Mono CJK HK</string>
    </edit>
  </match>

  <!-- Korean -->
  <match target="pattern">
    <test name="lang" compare="contains"><string>ko</string></test>
    <test name="family"><string>Noto Sans CJK SC</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Sans CJK KR</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>ko</string></test>
    <test name="family"><string>Noto Serif CJK SC</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Serif CJK KR</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>ko</string></test>
    <test name="family"><string>Noto Sans Mono CJK SC</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Sans Mono CJK KR</string>
    </edit>
  </match>

</fontconfig>
